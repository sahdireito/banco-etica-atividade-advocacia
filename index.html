<script>
const QUESTOES = [
  {num:1, exame:"XLVI Exame — 2026", titulo:"Estágio Profissional de Advocacia Após a Graduação", enunciado:"Alfredo é graduado em Direito pela Universidade Beta, mas não foi aprovado no Exame da OAB. Durante a graduação, não teve a oportunidade de estagiar em escritório de advocacia. Recentemente, após já estar formado, surgiu a oportunidade de estagiar em um escritório credenciado pelo Conselho Seccional da OAB. Ele deseja saber se pode participar do estágio profissional de advocacia mesmo após a conclusão do curso e se seria possível inscrever-se no quadro de estagiários da OAB.", comando:"Sobre a hipótese, com base no disposto no Art. 9º do Estatuto da Advocacia e da OAB, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Alfredo não pode participar de estágio de advocacia, pois o estágio só é permitido para estudantes de Direito que ainda estejam cursando os últimos anos do curso jurídico.", "B": "Alfredo pode se inscrever no quadro de estagiários da OAB, mas somente se concluir o estágio profissional em uma instituição de ensino superior, e não em escritório credenciado pelo Conselho Seccional da OAB.", "C": "Alfredo pode participar do estágio profissional de advocacia e inscrever-se como estagiário da OAB, mesmo após a conclusão do curso, desde que o estágio seja realizado em escritório credenciado pela OAB.", "D": "Alfredo pode participar do estágio profissional, mas não poderá inscrever-se no quadro de estagiários da OAB, pois já concluiu a graduação em Direito e apenas alunos ainda cursando o ensino jurídico podem obter essa inscrição."}, fb:{"A": "Incorreta. A conclusão do curso não extingue automaticamente a possibilidade de estágio profissional de advocacia — o Estatuto não restringe essa oportunidade exclusivamente a quem ainda está cursando os últimos anos da graduação.", "B": "Incorreta. O estágio profissional de advocacia pode ser realizado em escritório de advocacia credenciado pelo Conselho Seccional da OAB — não está limitado a instituições de ensino superior.", "C": "Correta! Art. 9º, EOAB: o Estatuto da Advocacia não veda o estágio profissional após a conclusão do curso. Alfredo pode inscrever-se no quadro de estagiários da OAB e realizar o estágio em escritório credenciado pelo Conselho Seccional. Os dois pontos estão corretos: possibilidade pós-graduação e possibilidade em escritório credenciado.", "D": "Incorreta. A inscrição no quadro de estagiários não está condicionada a estar cursando ativamente a graduação — o Estatuto permite a inscrição também em hipóteses posteriores à conclusão do curso, observados os demais requisitos."}, fund:"Art. 9º, EOAB: o estágio profissional de advocacia não é exclusivo de quem ainda está cursando os últimos anos do curso jurídico, podendo ser realizado em escritório de advocacia credenciado pelo Conselho Seccional, entre outras modalidades.", caqui:"Duas pegadinhas numa só questão: (1) Já se formou = não pode mais estagiar? NÃO — o Estatuto não diz isso. (2) Estágio só em faculdade? NÃO — pode ser em escritório credenciado pela OAB. Alfredo não passou na OAB ainda, mas pode continuar buscando experiência prática no estágio. Não confunda: quem NÃO PODE mais estagiar é quem já foi INSCRITO como advogado — aí o estágio perde o sentido."},
  {num:2, exame:"XLVI Exame — 2026", titulo:"Direitos da Advogada Gestante — Detector de Metais e Vaga em Garagem", enunciado:"Paloma, advogada gestante, compareceu ao Fórum da Comarca de Itaporanga/PB para participar de audiência. Ao tentar estacionar, foi impedida de acessar a garagem sob a justificativa de que não havia vagas reservadas para gestantes. Além disso, foi obrigada a passar por detector de metais, mesmo tendo informado sua condição.", comando:"Com base no Estatuto da OAB, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Paloma, por ser advogada gestante, tem o direito de não ser submetida a detectores de metais, mas o estacionamento exclusivo só é garantido em Tribunais e Fóruns Federais, não nos Fóruns Estaduais.", "B": "Os direitos de Paloma, como o de não ser submetida aos detectores de metais e à reserva de vagas, são aplicáveis apenas em Tribunais Superiores, e não se estendem a Fóruns de Comarcas Estaduais.", "C": "Paloma, por ser advogada gestante, tem o direito de entrar em Fóruns e Tribunais sem ser submetida a detectores de metais e tem direito à reserva de vagas nas garagens dos Fóruns dos Tribunais.", "D": "Paloma tem o direito de entrada no Fórum sem ser submetida a detectores de metais, mas o direito à reserva de vagas em garagens para gestantes é mera liberalidade do Tribunal e não é garantido por lei."}, fb:{"A": "Incorreta. Não há restrição de tribunais federais ou estaduais — a lei não distingue por esfera ou porte do tribunal.", "B": "Incorreta. Os direitos da advogada gestante não são exclusivos de Tribunais Superiores — aplicam-se a fóruns e tribunais em geral.", "C": "Correta! Art. 7º-A, I, EOAB: a advogada GESTANTE tem direito a: a) entrada em tribunais SEM submissão a detectores de metais e aparelhos de raios X; b) reserva de vaga em garagens dos fóruns dos tribunais. Ambos os direitos foram violados pelo Fórum de Itaporanga.", "D": "Incorreta. A reserva de vagas NÃO é liberalidade — é direito legalmente assegurado pelo art. 7º-A do Estatuto da OAB. Discricionariedade do tribunal seria inconstitucional e ilegal."}, fund:"Art. 7º-A, I, EOAB (Lei 13.363/2016): a) entrada em tribunais sem detectores de metais e aparelhos de raios X; b) reserva de vaga em garagens dos fóruns dos tribunais. Sem restrição a esfera federal ou instância específica.", caqui:"Art. 7º-A é o artigo da FGV para Ética! Decore por grupo: GESTANTE = sem detector + vaga na garagem. A FGV adora tentar restringir esses direitos a 'tribunais superiores' ou 'justiça federal' — mas isso não existe na lei. Paloma está em fórum estadual de comarca pequena e tem os mesmos direitos. Nenhum dos dois pontos (detector E vaga) é liberalidade — ambos são direitos legais."},
  {num:3, exame:"XLV Exame — 2025", titulo:"Direito da Advogada Lactante — Acesso a Creche ou Local Adequado", enunciado:"Ana é advogada e acaba de dar à luz seu primeiro filho, a quem ainda amamenta. Ela foi cientificada de que a Sexta Câmara Cível deverá julgar um caso em que é uma das advogadas constituídas pelo recorrente.", comando:"Sobre a hipótese, assinale a opção que indica o direito que Ana tem assegurado.", gabarito:"D", alt:{"A": "Vaga reservada na garagem do Fórum.", "B": "Suspensão de prazos processuais, desde que haja notificação por escrito ao cliente.", "C": "Entrada em tribunais sem ser submetida a detectores de metais e aparelhos de raios X.", "D": "Acesso a creche, onde houver, ou a local adequado para o atendimento das necessidades do bebê."}, fb:{"A": "Incorreta. Reserva de vaga em garagem é direito específico da advogada GESTANTE (art. 7º-A, I, b), não da lactante.", "B": "Incorreta. A suspensão de prazos processuais (art. 7º-A, IV) é direito da advogada ADOTANTE ou QUE DER À LUZ, não da lactante como categoria específica, e ainda assim exige ser a ÚNICA patrona da causa, com notificação por escrito ao cliente. Ana é uma DAS advogadas — não é única patrona.", "C": "Incorreta. Entrada sem detector de metais é direito específico da advogada GESTANTE (art. 7º-A, I, a), não da lactante.", "D": "Correta! Art. 7º-A, II, EOAB: a advogada LACTANTE (e também adotante ou que der à luz) tem direito de acesso a creche, onde houver, ou a local adequado ao atendimento das necessidades do bebê. Ana amamenta = lactante = esse é o direito correto para a situação narrada."}, fund:"Art. 7º-A, II, EOAB: direito da advogada lactante, adotante ou que der à luz — acesso a creche, onde houver, ou a local adequado ao atendimento das necessidades do bebê.", caqui:"O art. 7º-A tem quatro incisos para grupos diferentes — a FGV ama trocar um pelo outro. Memoriza assim: GESTANTE (I) = sem detector + vaga. LACTANTE/adotante/parto (II) = creche ou local adequado. GESTANTE+LACTANTE+adotante+parto (III) = preferência em audiências e sustentações. ADOTANTE ou PARTO (IV) = suspensão de prazos se única patrona + notificação escrita. Ana é LACTANTE = inciso II = creche ou local adequado."},
  {num:4, exame:"XLV Exame — 2025", titulo:"Sigilo Profissional do Advogado Após o Fim da Relação Contratual", enunciado:"Durante muitos anos, João representou Pedro como advogado em diversas causas. Recentemente, após encerrados todos os vínculos contratuais entre eles, Pedro passou a ser investigado por supostos ilícitos tributários.", comando:"Com base no Estatuto da OAB e no Código de Ética e Disciplina, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "João não poderá ser obrigado a depor como testemunha no curso de eventual processo judicial em face de Pedro, ainda que este expressamente o autorize ou solicite o depoimento do ex-advogado.", "B": "João não poderá ser obrigado a depor como testemunha no curso de eventual processo judicial em face de Pedro, exceto se este expressamente o autorizar, ou no caso de solicitação do próprio ex-constituinte.", "C": "João poderá ser obrigado a depor sobre fatos que constituam sigilo profissional caso seu depoimento seja considerado imprescindível para a instrução em processos criminais que apurem crimes dolosos contra a vida.", "D": "Como a investigação começou após o fim da relação profissional, não há prerrogativa que o escuse da obrigação de depor."}, fb:{"A": "Incorreta. O sigilo profissional pode ser afastado quando o próprio cliente/ex-cliente autoriza expressamente ou solicita o depoimento — a alternativa ignora essa exceção, tornando o sigilo absoluto quando não é.", "B": "Correta! O sigilo profissional do advogado é dever permanente — persiste mesmo após o encerramento da relação profissional. João não pode ser compelido a depor sobre fatos cobertos pelo sigilo. Exceção: se o próprio Pedro (ex-constituinte) autorizar expressamente o depoimento ou solicitar que João depoe, o impedimento ético cede.", "C": "Incorreta. O Estatuto/Código de Ética não prevê essa exceção baseada na natureza do crime ('crime doloso contra a vida'). O sigilo não cede por força do tipo de crime investigado.", "D": "Incorreta. O sigilo NÃO se extingue com o fim da relação profissional. Pedro continua protegido pelos fatos que João conheceu como seu advogado, independentemente de quando a investigação teve início."}, fund:"Art. 7º, XIX, EOAB + Código de Ética e Disciplina OAB: o advogado não pode ser compelido a depor sobre fatos de que tomou conhecimento no exercício da profissão, salvo autorização ou solicitação do próprio cliente/ex-cliente.", caqui:"Sigilo do advogado é PERMANENTE — não tem data de validade. O contrato acabou? O sigilo continua. A investigação começou anos depois? O sigilo continua. A única porta de saída é o PRÓPRIO cliente: se Pedro quiser que João depoe e autorizar, aí João pode. Mas sem autorização do protegido, o sigilo prevalece mesmo para o ex-advogado. O crime não importa: não existe hipótese de sigilo ceder por 'gravidade do delito investigado'."},
  {num:5, exame:"XLV Exame — 2025", titulo:"Atos Privativos por Não Inscrita e por Advogado Suspenso — Nulidade", enunciado:"Helena concluiu mestrado em Administração Pública e possui conhecimento jurídico, mas não tem graduação em Direito nem inscrição na OAB. Mesmo assim, passou a oferecer consultoria jurídica e a atuar em audiências representando clientes. André, por sua vez, era advogado regularmente inscrito, mas foi suspenso por infração disciplinar. Apesar disso, continuou a praticar atos privativos da advocacia, como peticionar e participar de audiências.", comando:"Com base nessas situações, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Os atos praticados por André, após a suspensão da OAB, são nulos, pois ele está impedido de exercer a advocacia enquanto durar a suspensão.", "B": "Os atos privativos praticados por Helena são válidos, desde que os clientes autorizem expressamente.", "C": "Os atos praticados por Helena são válidos, desde que restritos à consultoria extrajudicial e relacionados à administração pública.", "D": "Tanto os atos de Helena quanto os de André são anuláveis, mas passíveis de convalidação."}, fb:{"A": "Correta! André, durante a suspensão, perde temporariamente a capacidade de exercer a advocacia. Os atos privativos praticados nesse período são NULOS — não anuláveis, não convalidáveis. A suspensão retira a habilitação para o exercício da profissão enquanto viger.", "B": "Incorreta. A autorização do cliente NÃO supre a exigência de inscrição na OAB. Atos privativos da advocacia só podem ser praticados por quem tem capacidade legal — e nenhum cliente tem poder para 'dispensar' esse requisito legal.", "C": "Incorreta. Consultoria jurídica É ato privativo da advocacia (art. 1º, EOAB), independentemente de ser extrajudicial ou ligada à área de administração pública. Helena não pode prestá-la sem inscrição na OAB.", "D": "Incorreta. O Estatuto trata esses atos como NULOS — não como anuláveis ou convalidáveis. A irregularidade é de natureza absoluta, sem possibilidade de saneamento posterior pela vontade das partes."}, fund:"Art. 1º, EOAB: atos privativos de advogado. Art. 4º, EOAB: são nulos os atos privativos praticados por pessoa não inscrita na OAB, salvo as exceções previstas em lei. Suspensão retira temporariamente a capacidade de advogar.", caqui:"Regra de ouro: ATO PRIVATIVO + SEM CAPACIDADE = NULO. Não existe 'meio-termo' aqui: não é anulável, não é convalidável, não importa que o cliente queira ou que a área seja específica. Helena sem OAB + André suspenso = mesma situação de invalidade. A pegadinha da D ('anuláveis e convalidáveis') é tentadora mas errada — o Estatuto é mais rigoroso do que isso."},
  {num:6, exame:"XLIV Exame — 2025", titulo:"Acesso do Advogado aos Autos de Investigação Sigilosa", enunciado:"No âmbito de investigação sigilosa, foi decretada a prisão de João. Carlos, amigo íntimo de João, é advogado regularmente inscrito na OAB. Ao saber da prisão, dirigiu-se à delegacia e depois procurou o magistrado plantonista para tratar do caso.", comando:"Assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Carlos somente terá acesso aos autos da investigação se apresentar procuração. Nesse caso, terá amplo acesso a todos os elementos de prova, sem qualquer limitação.", "B": "Carlos terá acesso aos autos independentemente de procuração e com amplo acesso, sem qualquer limitação.", "C": "Carlos somente terá acesso aos autos da investigação se apresentar procuração para representá-lo. Entretanto, o acesso aos elementos de prova colhidos pela autoridade policial poderá ser delimitado, desde que relacionados a diligências em andamento e ainda não documentados nos autos, desde que haja comprovado risco de comprometimento da eficiência, da eficácia ou da finalidade da investigação.", "D": "Carlos terá acesso independentemente de procuração, mas o acesso poderá ser delimitado inclusive quanto a diligências já encerradas e documentadas."}, fb:{"A": "Incorreta. A primeira parte está correta (precisa de procuração em investigação sigilosa), mas erra na segunda: o acesso não é absolutamente irrestrito. Diligências em andamento não documentadas podem ser resguardadas.", "B": "Incorreta. Investigação sigilosa exige procuração para que o advogado acesse os autos em nome do investigado. O acesso 'independentemente de procuração' é regra para investigações SEM sigilo.", "C": "Correta! Em investigação sigilosa, o advogado precisa apresentar procuração para ter acesso aos autos em nome do investigado. Mas o acesso não é ilimitado: pode ser delimitado quanto a diligências EM ANDAMENTO e ainda não documentadas, se houver risco concreto à investigação. Os elementos já documentados, porém, são acessíveis à defesa (Súmula Vinculante 14, STF).", "D": "Incorreta. A restrição não pode alcançar diligências já encerradas e documentadas — isso violaria o direito de defesa e a Súmula Vinculante 14, STF."}, fund:"Art. 7º, XIV, EOAB: acesso a autos de investigação. Súmula Vinculante 14, STF: o defensor tem direito de acesso aos elementos já documentados nos autos do inquérito, independentemente de sigilo. Restrição possível apenas para diligências em andamento não documentadas, mediante fundamento concreto.", caqui:"Regra do inquérito sigiloso: P + D. P = PROCURAÇÃO (necessária para acessar como representante do investigado). D = DOCUMENTADO (o que já está nos autos o defensor pode ver). O que PODE ser restringido? Diligências em curso, ainda não documentadas, com risco concreto à investigação. O que NÃO PODE ser restringido? Provas já documentadas — isso violaria a SV 14 e o direito de defesa."},
  {num:7, exame:"XLIV Exame — 2025", titulo:"Carteira da OAB como Documento de Identidade Civil — Embarque em Avião", enunciado:"O advogado Ivan precisava embarcar em um voo doméstico de Recife para Curitiba para participar de um congresso. Ao chegar ao check-in, percebeu que havia esquecido todos os documentos de identificação, exceto a carteira da OAB com foto. A companhia aérea informou que não aceitaria a carteira da OAB como documento de identidade e, por isso, ele estaria impedido de embarcar.", comando:"Com base no Estatuto da OAB, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Ivan não poderá embarcar, pois a carteira da OAB não é considerada documento de identidade civil válido para viagens nacionais em aviões.", "B": "Ivan poderá embarcar, pois a carteira da OAB constitui prova de identidade civil para todos os fins legais, inclusive para viagens nacionais em aviões.", "C": "Ivan somente poderá embarcar se apresentar outro documento de identificação civil junto com a carteira da OAB.", "D": "Ivan não poderá embarcar, pois a carteira da OAB só é válida como identificação no exercício da atividade profissional em fóruns e tribunais."}, fb:{"A": "Incorreta. A carteira da OAB tem eficácia civil geral — não está restrita a determinadas situações.", "B": "Correta! Art. 13, EOAB: a carteira e o cartão de identidade expedidos pela OAB valem como prova de identidade, para TODOS os fins legais. A companhia aérea é obrigada a aceitar esse documento como identificação civil válida para embarque em voo doméstico.", "C": "Incorreta. Não há exigência legal de apresentar outro documento em conjunto. A carteira da OAB é suficiente por si mesma.", "D": "Incorreta. A eficácia da carteira da OAB como identidade não se limita ao exercício profissional. 'Todos os fins legais' significa exatamente isso — incluindo embarques, operações bancárias, repartições públicas etc."}, fund:"Art. 13, EOAB: a carteira e o cartão de identidade expedidos pela OAB valem como prova de identidade para todos os fins legais.", caqui:"Carteira da OAB = duas identidades numa só: (1) IDENTIDADE PROFISSIONAL (prova que é advogado); (2) IDENTIDADE CIVIL (vale para qualquer situação que exija identificação). A FGV adora restringir artificialmente essa validade a 'fóruns e tribunais' ou 'atividade profissional' — isso está ERRADO. 'Todos os fins legais' é literal: avião, banco, Detran, hospital, qualquer repartição pública."},
  {num:8, exame:"XLIII Exame — 2025", titulo:"Comunicação Reservada do Advogado com o Preso — Independe de Procuração", enunciado:"Aurélio, advogado regularmente inscrito na OAB, recebeu notícia de que Adalberto, seu amigo de infância, havia sido preso em flagrante por homicídio. Ao chegar à delegacia para prestar assistência jurídica, o delegado negou que Aurélio se comunicasse pessoal e reservadamente com o preso, sob dois argumentos: a gravidade do crime e a ausência de procuração.", comando:"Assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A negativa foi legítima, porque a gravidade do homicídio permite limitar a comunicação do advogado com o preso.", "B": "A comunicação só poderia ocorrer mediante apresentação de procuração.", "C": "A atuação de Aurélio é ilegal, pois advogar para amigo próximo gera conflito ético-profissional.", "D": "A negativa foi ilegal, pois Aurélio tem direito de comunicar-se pessoal e reservadamente com Adalberto, mesmo sem procuração, conforme o Estatuto da OAB."}, fb:{"A": "Incorreta. A gravidade do crime NÃO é fundamento para restringir a prerrogativa de comunicação reservada do advogado com o preso. Esse direito existe independentemente da natureza do delito.", "B": "Incorreta. A comunicação pessoal e reservada com o preso prescinde de procuração — é prerrogativa que independe da formalização do mandato.", "C": "Incorreta. Não existe vedação ética automática de o advogado atuar em favor de amigo próximo. O vínculo de amizade, por si só, não configura incompatibilidade ou impedimento ético.", "D": "Correta! Art. 7º, III, EOAB: o advogado tem direito de comunicar-se com seus clientes, pessoal e reservadamente, MESMO SEM PROCURAÇÃO, quando estes estiverem presos, detidos ou recolhidos em estabelecimentos civis ou militares, ainda que considerados incomunicáveis. As duas justificativas do delegado (gravidade do crime + ausência de procuração) são inválidas."}, fund:"Art. 7º, III, EOAB: comunicação pessoal e reservada com o preso, mesmo sem procuração, independentemente da gravidade do crime ou de incomunicabilidade decretada.", caqui:"Preso + advogado inscrito na OAB = conversa reservada GARANTIDA. Não importa: a gravidade do crime, se tem procuração ou não, se o crime é inafiançável, se há incomunicabilidade decretada. A única coisa que importa é que Aurélio é advogado inscrito. A prerrogativa é PROFISSIONAL, não depende de ser o advogado 'oficial' do caso — basta chegar como advogado para prestar assistência."},
  {num:9, exame:"XLIII Exame — 2025", titulo:"Habeas Corpus — Não é Atividade Privativa da Advocacia", enunciado:"Afonso, condenado por tráfico, divide cela com Rodrigo, preso preventivamente há mais de dois anos sem conclusão da instrução do processo por roubo. Indignado, Afonso — que não tem formação jurídica — decide redigir, de próprio punho, um pedido de habeas corpus em favor do companheiro de cela.", comando:"Assinale a afirmativa correta.", gabarito:"B", alt:{"A": "A impetração de habeas corpus é atividade privativa de advogado regularmente inscrito na OAB.", "B": "Afonso poderá redigir e impetrar o habeas corpus em favor de Rodrigo, pois a impetração desse remédio constitucional não está incluída entre as atividades privativas da advocacia.", "C": "Afonso só poderia impetrar o habeas corpus se comprovasse ausência de advogado disponível.", "D": "A impetração de habeas corpus por leigo é vedada quando se tratar de crime grave."}, fb:{"A": "Incorreta. O habeas corpus é justamente a exceção clássica ao rol de atos privativos. Impetrar HC não exige inscrição na OAB.", "B": "Correta! Art. 1º, §1º, EOAB: não são atos privativos de advogado a impetração de habeas corpus em qualquer instância ou tribunal. Qualquer pessoa pode impetrar HC — o próprio preso, um familiar, um amigo, um colega de cela, um cidadão qualquer, mesmo sem formação jurídica.", "C": "Incorreta. Não existe essa condição no Estatuto. Nenhuma comprovação de 'ausência de advogado disponível' é necessária.", "D": "Incorreta. A natureza ou gravidade do crime não altera essa regra. HC por leigo é sempre possível, independentemente do crime que motivou a prisão."}, fund:"Art. 1º, §1º, EOAB: não são atos privativos de advogado a impetração de habeas corpus em qualquer instância ou tribunal.", caqui:"A exceção mais famosa da OAB: HC qualquer pessoa pode impetrar. Enquanto postular em juízo, em regra, exige advogado — o habeas corpus é a válvula de segurança do sistema: QUALQUER pessoa, advogado ou não, pode bater na porta do tribunal pedindo liberdade para si ou para alguém. Afonso pode escrever um HC para Rodrigo com a própria mão, sem formação jurídica, sem procuração, sem nada. Só precisa ter razão."},
  {num:10, exame:"XLII Exame — 2024", titulo:"Carteira da OAB como Identidade Civil no Detran", enunciado:"Rita, advogada regularmente inscrita na OAB, compareceu ao Detran para transferir um veículo. Ao apresentar a carteira da OAB como documento de identificação civil, o funcionário recusou o documento e exigiu RG ou CNH.", comando:"Assinale a alternativa correta.", gabarito:"A", alt:{"A": "A recusa foi ilegítima, uma vez que o documento emitido pela OAB constitui prova de identidade civil para todos os fins legais.", "B": "A recusa foi correta, pois não há previsão legal que autorize o uso da carteira da OAB como documento de identificação civil.", "C": "A recusa foi inválida, mas apenas por força da prática consuetudinária.", "D": "A recusa foi inadequada, porém não ilegal, porque a validade da carteira da OAB estaria apenas em norma interna da advocacia."}, fb:{"A": "Correta! Art. 13, EOAB: a carteira da OAB constitui prova de identidade civil para todos os fins legais. A recusa do Detran é ilegítima — desrespeita previsão legal expressa.", "B": "Incorreta. Existe previsão legal expressa no art. 13 do Estatuto da Advocacia (Lei 8.906/94), que é lei federal.", "C": "Incorreta. A validade não decorre de costume — decorre de lei federal. O fundamento é normativo, não consuetudinário.", "D": "Incorreta. O art. 13 é norma de lei federal (Lei 8.906/94), não norma interna da OAB. A eficácia é oponível a todos, incluindo repartições públicas como o Detran."}, fund:"Art. 13, EOAB: a carteira e o cartão de identidade expedidos pela OAB valem como prova de identidade para todos os fins legais.", caqui:"Questão irmã da Q7 (embarque em avião). Mesma base legal, contexto diferente (Detran). A lição é a mesma: carteira da OAB = identidade civil universal. A FGV adora criar 'exceções' que não existem: 'só no fórum', 'só com outro documento', 'é costume', 'é norma interna'. Tudo errado. É lei federal. Vale em QUALQUER lugar que exija identificação civil."},
  {num:11, exame:"XLII Exame — 2024", titulo:"Busca e Apreensão no Local de Trabalho do Advogado", enunciado:"Em operação da Polícia Federal, surgiram elementos de autoria e materialidade de crime praticado por Cláudio, advogado regularmente inscrito na OAB. A Justiça Federal expediu mandado de busca e apreensão específico e pormenorizado, cumprido na presença de representante da OAB, no endereço residencial de Cláudio, que também servia como local de trabalho. Foram apreendidos notebook e celulares com informações sobre diversos processos de clientes patrocinados por Cláudio.", comando:"Assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A medida é inválida, pois o escritório ou local de trabalho do advogado é absolutamente inviolável.", "B": "A medida é válida porque ocorreu na residência, não no escritório, mas as informações dos clientes jamais poderiam ser utilizadas.", "C": "A medida é inválida, mas as informações dos clientes poderiam ser usadas se eles também fossem investigados.", "D": "A medida é válida, e as informações sobre clientes poderão ser utilizadas se esses clientes forem formalmente investigados como partícipes ou coautores do mesmo crime que justificou a medida."}, fb:{"A": "Incorreta. A inviolabilidade do local de trabalho do advogado NÃO é absoluta. Art. 7º, §6º, EOAB: presentes indícios de autoria e materialidade de crime pelo advogado, a autoridade judiciária pode decretar a quebra da inviolabilidade.", "B": "Incorreta. A validade não decorre de ser 'residência e não escritório' — o enunciado informa que o local servia como ambos. Além disso, as informações de clientes não são 'jamais utilizáveis' — há exceção legal.", "C": "Incorreta. A medida é válida (não inválida) — todos os requisitos foram observados.", "D": "Correta! A busca foi VÁLIDA: havia indícios de autoria e materialidade, mandado específico e pormenorizado, cumprimento com representante da OAB. Quanto às informações de clientes: art. 7º, §6º, EOAB veda o uso dos documentos pertencentes a clientes do advogado averiguado — SALVO se tais clientes também estiverem sendo investigados como suspeitos, indiciados, acusados ou condenados pela prática do MESMO crime que ensejou a quebra da inviolabilidade."}, fund:"Art. 7º, II e §6º, EOAB: a inviolabilidade do escritório/local de trabalho pode ser quebrada por decisão judicial fundamentada, com mandado específico, presença da OAB, e havendo indícios de crime do advogado. Dados de clientes são protegidos, salvo se clientes investigados pelo mesmo crime.", caqui:"Inviolabilidade do escritório = proteção FORTE, mas não blindagem absoluta. Dois requisitos para a busca ser válida: (1) mandado específico e pormenorizado + (2) representante da OAB presente. E sobre os dados de clientes: a lei diz 'vedada a utilização... salvo se os clientes também estiverem sendo investigados pelo MESMO crime'. Então: se o crime do advogado está conectado com crimes de clientes específicos, esses clientes investigados perdem a proteção para os dados relacionados a esse crime específico."},
  {num:12, exame:"XL Exame — 2024", titulo:"Preferência em Audiência para Advogada Lactante — Independe de Ser Única Patrona", enunciado:"Mariângela, advogada trabalhista, foi intimada para audiência una às 16h15. Como está amamentando sua filha recém-nascida, protocolou pedido de preferência na ordem das audiências, com a devida comprovação da condição. O juiz indeferiu o pedido porque havia outra advogada constituída nos autos, que poderia comparecer ao ato.", comando:"Assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Como existem duas advogadas constituídas e não há previsão legal, a condição de lactante não basta para o deferimento.", "B": "Não há previsão legal, mas o juiz deveria deferir com base na prática forense e na razoabilidade.", "C": "Só haveria previsão legal se Mariângela comprovasse ser a única patrona da causa.", "D": "Mariângela tem direito de preferência assegurado em lei, independentemente de haver outra advogada constituída nos autos."}, fb:{"A": "Incorreta. Há previsão legal expressa (art. 7º-A, III, EOAB) — a alternativa erra ao dizer que não há previsão legal.", "B": "Incorreta. Não é questão de 'razoabilidade' ou 'prática forense' — é direito legal. A base não é costume, é lei.", "C": "Incorreta. O requisito de ser 'única patrona da causa' se aplica à SUSPENSÃO DE PRAZOS PROCESSUAIS (inciso IV), não à preferência em audiências. Os dois direitos têm requisitos diferentes!", "D": "Correta! Art. 7º-A, III, EOAB: a advogada GESTANTE, LACTANTE, ADOTANTE ou QUE DER À LUZ tem direito à preferência na ordem das sustentações orais e das audiências a serem realizadas a cada dia, MEDIANTE COMPROVAÇÃO DA CONDIÇÃO. A existência de outra advogada constituída nos autos não elimina esse direito — ele pertence à advogada, não ao processo."}, fund:"Art. 7º-A, III, EOAB: preferência na ordem das audiências e sustentações orais para advogada gestante, lactante, adotante ou que der à luz, mediante comprovação — sem condicionante de ser única patrona.", caqui:"Atenção à diferença entre dois incisos do art. 7º-A: inciso III (PREFERÊNCIA em audiências e sustentações) = vale para gestante, lactante, adotante, pós-parto; exige só COMPROVAÇÃO. Inciso IV (SUSPENSÃO DE PRAZOS) = só para adotante ou pós-parto; exige ser ÚNICA PATRONA + notificação escrita ao cliente. A FGV adora misturar esses requisitos. Aqui se pede preferência = sem condição de única patrona. Mariângela comprou comprovação, pediu preferência = tem direito."},
  {num:13, exame:"XL Exame — 2024", titulo:"Prisão em Flagrante de Advogada por Motivo Ligado à Advocacia", enunciado:"Monique, advogada regularmente inscrita na OAB, é investigada em inquérito policial por supostos crimes praticados por motivo ligado ao exercício da advocacia. Ela foi presa em flagrante em seu escritório, enquanto atendia uma cliente.", comando:"Assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Monique tem direito à presença de representante da OAB para a lavratura do auto de prisão em flagrante, por se tratar de suposto crime por motivo ligado ao exercício da advocacia, sob pena de nulidade.", "B": "Não há qualquer prerrogativa especial no caso, devendo receber tratamento idêntico ao de qualquer não advogado.", "C": "A presença de representante da OAB seria devida em qualquer crime praticado por advogado, ainda que sem relação com o exercício profissional.", "D": "O representante da OAB pode ser substituído por representante da Defensoria Pública."}, fb:{"A": "Correta! Art. 7º, IV, EOAB: o advogado tem direito de ter sua prisão em flagrante, quando por motivo ligado ao exercício da advocacia, lavrado na presença de representante da OAB, sob pena de nulidade. Monique: advogada inscrita + presa em flagrante + crime ligado à advocacia = prerrogativa plenamente incidente.", "B": "Incorreta. Há prerrogativa específica quando o flagrante tem motivo ligado ao exercício profissional — o tratamento não é igual ao de um não advogado.", "C": "Incorreta. A prerrogativa é ESPECÍFICA: aplica-se SOMENTE quando o crime tem motivo ligado ao exercício da advocacia. Se o advogado comete crime sem qualquer relação com a profissão (ex: trânsito), essa prerrogativa não incide.", "D": "Incorreta. A lei exige representante da OAB especificamente — não há previsão de substituição por representante da Defensoria Pública ou qualquer outra instituição."}, fund:"Art. 7º, IV, EOAB: flagrante de advogado por motivo ligado ao exercício da advocacia deve ser lavrado na presença de representante da OAB, sob pena de nulidade.", caqui:"Duplo filtro para incidência dessa prerrogativa: (1) QUEM: advogado regularmente inscrito. (2) MOTIVO DO CRIME: ligado ao exercício da advocacia. Só quando ambos os requisitos estão presentes é que a OAB deve estar presente na lavratura do flagrante, sob pena de NULIDADE. Se o advogado cometer crime de trânsito, furto, ou qualquer crime sem conexão com a profissão, essa prerrogativa específica não se aplica."},
  {num:14, exame:"XL Exame — 2024", titulo:"Mandato do Advogado Não se Extingue pelo Decurso do Tempo", enunciado:"Sebastião, advogado, celebrou contrato de mandato com Amir para representá-lo extrajudicialmente. As atividades contratadas, por sua própria natureza, prolongaram-se no tempo e, mais de 20 anos depois, ainda eram necessárias ao cliente.", comando:"Assinale a afirmativa correta.", gabarito:"C", alt:{"A": "O mandato extinguiu-se pelo decurso do tempo, salvo se previsto prazo diverso no instrumento.", "B": "O mandato extinguiu-se pelo decurso do tempo, sendo vedada previsão de prazo diverso.", "C": "O mandato não se extinguiu pelo decurso do tempo, salvo se foi consignado prazo no respectivo instrumento.", "D": "O mandato não se extinguiu pelo decurso do tempo, sendo vedada a estipulação de prazo no instrumento."}, fb:{"A": "Incorreta. Inverte a regra: o mandato NÃO se extingue pelo simples decurso do tempo. A lógica é oposta ao que a alternativa afirma.", "B": "Incorreta. O mandato não se extingue pelo tempo (correto), mas não há vedação à estipulação de prazo — é justamente a existência de prazo no instrumento que pode modificar essa regra.", "C": "Correta! Regra do EOAB: o mandato do advogado NÃO se extingue pelo simples decurso do tempo. Exceção: se o próprio instrumento tiver consignado um prazo, aí sim esse prazo importa. Sem prazo expresso = o tempo não mata o mandato.", "D": "Incorreta. Erra ao afirmar que seria vedada a estipulação de prazo no instrumento — não existe essa vedação."}, fund:"Estatuto da Advocacia e Código Civil: o mandato do advogado não se extingue pelo decurso do tempo, salvo se estabelecido prazo no instrumento de mandato ou se ocorrer outra causa de extinção legal (revogação, renúncia, morte etc.).", caqui:"O relógio sozinho não mata o mandato do advogado. Diferente do que muita gente pensa, 1 ano, 5 anos, 20 anos de mandato sem renovação expressa não extingue automaticamente o contrato. O que extingue: revogação, renúncia, morte, prazo expresso no instrumento. Sem prazo expresso = mandato vivo até que uma causa legal o extinga. A FGV gosta de colocar prazos longos (20 anos!) para confundir — mas 20 anos de mandato sem prazo = mandato válido."},
  {num:15, exame:"XXXIX Exame — 2023", titulo:"Direito do Advogado de Orientar o Cliente em Audiência de Conciliação", enunciado:"Bruno, advogado, compareceu à audiência de conciliação acompanhado de seu cliente Carlos, com poderes para transacionar em juízo ou fora dele. Na audiência, foi oferecida proposta de acordo pela parte adversa, que não foi aceita por Bruno, pois conflitava flagrantemente com os interesses de seu cliente. O magistrado cassou a palavra de Bruno, determinando que não se manifestasse mais durante a audiência, sob o fundamento de que a opção de aceitar ou não o acordo seria de decisão única de Carlos, sem possibilidade de influência de seu patrono.", comando:"Nesse contexto, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "O magistrado agiu corretamente, pois deve manter a ordem dos trabalhos e fomentar a solução pacífica dos conflitos.", "B": "A palavra de Bruno não poderia ter sido cassada sob o fundamento de que aceitar ou não o acordo é decisão única de Carlos sem possibilidade de influência de seu patrono, pois o advogado é indispensável à administração da justiça e deve orientar seu cliente.", "C": "Se Bruno insistir em falar com o cliente sobre a aceitação ou não do acordo, responderá perante a OAB por violação da ordem hierárquica do magistrado.", "D": "Em caso de insubordinação, o juiz poderá determinar à seccional da OAB a suspensão do advogado por prazo não inferior a dois anos."}, fb:{"A": "Incorreta. Manter a ordem não autoriza o juiz a cassar a palavra do advogado sob o fundamento de que ele 'não pode influenciar o cliente'. Fomentar a conciliação não significa pressionar a aceitação ou silenciar o patrono.", "B": "Correta! Art. 2º, EOAB + Art. 133, CF: o advogado é indispensável à administração da justiça. A função do advogado não é apenas formal — ele deve orientar tecnicamente o cliente sobre conveniência, riscos e consequências jurídicas de um acordo. Decisão final = do cliente. Orientação técnica = do advogado. As duas coisas coexistem; o juiz não pode eliminar a segunda sob o pretexto de respeitar a primeira.", "C": "Incorreta. Não existe 'subordinação hierárquica' do advogado ao magistrado. O advogado deve urbanidade e respeito ao juiz, mas não perde suas prerrogativas profissionais por isso.", "D": "Incorreta. O magistrado não tem poder para determinar à OAB a suspensão do advogado — as sanções disciplinares têm procedimento próprio perante a OAB, sem interferência do Judiciário."}, fund:"Art. 2º, EOAB e Art. 133, CF: o advogado é indispensável à administração da justiça, exercendo função técnica de defesa e orientação do cliente. Prerrogativas do advogado incluem falar na defesa dos interesses de seu constituinte.", caqui:"O juiz usou um argumento aparentemente lógico ('o acordo é do cliente') para fazer algo ilógico ('portanto o advogado não pode orientar o cliente'). Isso é ilegal. O acordo pertence ao cliente — mas a orientação sobre o acordo pertence ao advogado. São coisas diferentes. A bússola jurídica é do advogado. A assinatura é do cliente. Tirar a bússola do advogado não 'devolve' a decisão para o cliente — apenas coloca o cliente desorientado para decidir."},
  {num:16, exame:"XXXIX Exame — 2023", titulo:"Atuação sem Procuração em Caso de Urgência — 15 Dias para Apresentar", enunciado:"Luana, advogada especialista em Direito Civil, é procurada por Carla, que busca ajuizar demanda para obtenção de indenização por danos morais e materiais em face de seu vizinho. Ao tomar conhecimento dos fatos, Luana percebe que aquele era o último dia possível para o ajuizamento da ação, pois a prescrição da pretensão de sua cliente se consumaria no dia seguinte. Luana peticionou perante o juízo competente sem, contudo, ter tido tempo hábil para anexar a procuração de sua cliente, em razão da urgência decorrente da iminente prescrição.", comando:"Considerando as disposições do Estatuto da OAB, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A advogada Luana não pode postular em juízo ou fora dele sem procuração, ainda que em situação de alegada urgência.", "B": "A urgência, por si só, não é suficiente para justificar a não apresentação da procuração, devendo ser conjugada com iminente risco à integridade física ou à vida do cliente.", "C": "Luana não está obrigada a apresentar procuração, visto que o mandato conferido por seus clientes é presumido pelos fatos narrados na inicial e pela documentação que a instrui.", "D": "No contexto da iminente prescrição da pretensão de sua cliente, Luana, afirmando urgência, pode atuar sem procuração, obrigando-se a apresentá-la no prazo de quinze dias, prorrogável por igual período."}, fb:{"A": "Incorreta. O Estatuto prevê exceção para urgência — a regra da procuração não é absoluta.", "B": "Incorreta. O Estatuto não exige risco à vida ou integridade física. Urgência decorrente de iminente prescrição é fundamento válido.", "C": "Incorreta. Não existe 'mandato presumido pelos fatos da inicial'. O que existe é a possibilidade de atuar sem procuração em urgência, com obrigação de apresentá-la depois.", "D": "Correta! Art. 5º, §1º, EOAB: o advogado, afirmando urgência, pode atuar sem procuração, obrigando-se a apresentá-la no prazo de 15 dias, prorrogável por igual período. Prescrição no dia seguinte = urgência concreta e inequívoca = Luana pode agir agora e juntar a procuração depois."}, fund:"Art. 5º, §1º, EOAB: o advogado pode atuar sem procuração em caso de urgência, obrigando-se a apresentá-la no prazo de 15 dias, prorrogável por igual período.", caqui:"Fórmula da urgência: AGE AGORA, JUNTA DEPOIS. Prazo para juntar: 15 + 15 = até 30 dias (15 dias prorrogável por mais 15). A urgência não precisa ser 'perigo de vida' — prescrição no dia seguinte é urgência suficiente. A iminente perda de um direito da cliente justifica a atuação imediata sem aguardar formalidades. Mas atenção: a obrigação de apresentar a procuração existe e tem prazo — não é dispensa definitiva."},
  {num:17, exame:"XXXIX Exame — 2023", titulo:"Assessoria Jurídica Verbal e Desnecessidade de Mandato", enunciado:"O advogado Edson foi contratado para prestar a um cliente assessoria jurídica quanto a uma questão imobiliária.", comando:"Considerando o caso hipotético, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Edson pode prestar a assessoria de modo verbal. Também não é necessária a outorga de mandato ou formalização por contrato de honorários.", "B": "Edson deve prestar a assessoria de modo escrito. Faz-se necessária a outorga de mandato, mesmo que não haja formalização por contrato de honorários.", "C": "Edson pode prestar a assessoria de modo verbal. É necessária a outorga de mandato, mesmo que não haja formalização por contrato de honorários.", "D": "Edson deve prestar a assessoria de modo escrito, mas não é necessária a outorga de mandato ou formalização por contrato de honorários."}, fb:{"A": "Correta! Assessoria jurídica (consultoria) é atividade de ORIENTAÇÃO do cliente, sem representação perante terceiros. Para essa finalidade específica: (1) pode ser prestada verbalmente — não há exigência de forma escrita; (2) não exige mandato/procuração — procuração é necessária quando o advogado vai REPRESENTAR o cliente, não quando apenas orienta; (3) não exige formalização de contrato de honorários como requisito de validade (embora seja recomendável).", "B": "Incorreta. Dois erros: assessoria não precisa ser escrita, e não é necessário mandato para mera orientação/consultoria.", "C": "Incorreta. A assertiva acerta que pode ser verbal, mas erra ao exigir mandato para assessoria/consultoria.", "D": "Incorreta. Impõe exigência de forma escrita que não existe para assessoria verbal."}, fund:"Estatuto da OAB e Código de Ética: assessoria/consultoria jurídica pode ser verbal; mandato (procuração) é exigido para representação do cliente, não para orientação jurídica. A orientação pode ser mais informal.", caqui:"Distinção fundamental: ORIENTAR ≠ REPRESENTAR. Quando o advogado orienta o cliente (assessoria, consultoria) = pode ser verbal, sem procuração, sem contrato escrito de honorários. Quando o advogado age EM NOME do cliente perante terceiros (juízo, cartório, negociação formal) = aí precisa de procuração. Edson está sendo contratado para ORIENTAR sobre uma questão imobiliária, não para representar o cliente em nenhum ato. Portanto: informal e sem mandato é válido."},
  {num:18, exame:"XXXIX Exame — 2023", titulo:"Inscrição na OAB de Graduado em Direito no Exterior — Estágio Dispensado", enunciado:"Pedro, cidadão brasileiro, graduou-se em Direito em renomada instituição norte-americana. Caso deseje exercer no Brasil a profissão de advogado, Pedro deverá solicitar inscrição na Ordem dos Advogados do Brasil.", comando:"Sobre a hipótese, assinale a opção que indica o requisito que, em tal ocasião, Pedro estará dispensado de apresentar.", gabarito:"C", alt:{"A": "Revalidação do título de graduação em Direito.", "B": "Aprovação em Exame de Ordem.", "C": "Ter sido admitido em estágio profissional de advocacia.", "D": "Prestação de compromisso perante o conselho."}, fb:{"A": "Incorreta. Pedro NÃO está dispensado da revalidação. Diploma obtido no exterior precisa ser revalidado para produzir efeitos no Brasil, inclusive para fins de inscrição na OAB.", "B": "Incorreta. Pedro NÃO está dispensado do Exame de Ordem. A aprovação no Exame é requisito indispensável para inscrição como advogado, independentemente de onde se formou.", "C": "Correta! O estágio profissional de advocacia NÃO é requisito para inscrição como advogado (é requisito para a inscrição como estagiário, não como advogado). Art. 8º, EOAB: os requisitos para inscrição como advogado são: capacidade civil, diploma, aprovação no Exame de Ordem, idoneidade, inexistência de incompatibilidade, prestação de compromisso. Estágio não consta do rol.", "D": "Incorreta. Pedro NÃO está dispensado de prestar compromisso perante o conselho — é requisito legal do art. 8º, EOAB."}, fund:"Art. 8º, EOAB: requisitos para inscrição como advogado — capacidade civil, diploma (revalidado se obtido no exterior), aprovação no Exame de Ordem, idoneidade moral, inexistência de incompatibilidade, compromisso. Estágio profissional não está listado como requisito.", caqui:"A questão pede o que Pedro está DISPENSADO de apresentar — não o que precisa cumprir. Liste mentalmente os requisitos do art. 8º: diploma válido + Exame de Ordem + idoneidade + sem incompatibilidade + compromisso. O estágio ajuda na formação e na inscrição de ESTAGIÁRIO, mas não é requisito para ser ADVOGADO. Pedro, mesmo formado nos EUA, precisa de tudo, exceto do estágio."},
  {num:19, exame:"XXXIX Exame — 2023", titulo:"Desagravo Público — Local da Sessão", enunciado:"Durante audiência de instrução e julgamento da qual participou na qualidade de advogado, Robson foi comprovadamente ofendido por palavras desferidas pelo juiz que presidia o ato. Abalado em razão desse fato, Robson decide buscar as informações necessárias para obter desagravo público perante o Conselho Seccional competente da OAB.", comando:"A esse respeito, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "O relator deverá solicitar informações da autoridade ofensora, como condição para a concessão do desagravo.", "B": "Não há previsão legal ou regulamentar de prazo máximo para concessão do desagravo, em caso de acolhimento do parecer do relator, aplicando-se o princípio da Duração Razoável do Processo.", "C": "O desagravo será concedido em sessão realizada para essa finalidade, amplamente divulgada, sendo vedada, em qualquer caso, a concessão imediata.", "D": "A sessão de desagravo deverá ser realizada, preferencialmente, no local onde a ofensa foi sofrida ou onde se encontre a autoridade ofensora."}, fb:{"A": "Incorreta. A solicitação de informações à autoridade ofensora não é CONDIÇÃO obrigatória para a concessão do desagravo — a banca inseriu 'como condição' justamente para criar erro.", "B": "Incorreta. Existe regulamentação do procedimento do desagravo, inclusive com disciplina de tramitação — afirmar que 'não há qualquer prazo' é generalização indevida.", "C": "Incorreta. A vedação à concessão imediata 'em qualquer caso' é absoluta demais. O Regulamento não veda categoricamente a concessão imediata em qualquer hipótese.", "D": "Correta! O Regulamento Geral da OAB prevê que a sessão de desagravo deve ser realizada, PREFERENCIALMENTE, no local onde a ofensa foi sofrida ou onde se encontre a autoridade ofensora. Robson foi ofendido durante audiência = preferencialmente, o desagravo deve ocorrer naquele local ou onde está o juiz."}, fund:"Regulamento Geral da OAB e art. 7º, §5º, EOAB: o desagravo público é prerrogativa para defesa da honra e da dignidade do advogado ofendido no exercício profissional. A sessão de desagravo se realiza preferencialmente no local da ofensa ou onde se encontre a autoridade ofensora.", caqui:"Desagravo público é a OAB dizendo publicamente: 'quem ofendeu este advogado no exercício da profissão ofendeu a advocacia toda'. O detalhe procedimental cobrado é o LOCAL: preferencialmente onde a ofensa ocorreu (aquela vara, aquele fórum) ou onde está o ofensor. Faz sentido — o ato de reparação deve ser público e visível no mesmo ambiente onde a ofensa aconteceu."},
  {num:20, exame:"XXXIX Exame — 2023", titulo:"Colaboração Premiada e Violação do Sigilo Profissional", enunciado:"Alice Santos, advogada, está sendo investigada criminalmente por ter supostamente cometido fraude contra o sistema previdenciário, em conjunto com Robson Lima (cliente) e Leonardo Melo (ex-cliente). O órgão competente do Ministério Público consulta a Dra. Alice Santos sobre seu interesse em efetuar colaboração premiada.", comando:"Com base na legislação aplicável, assinale a afirmativa que apresenta, corretamente, o que ela concluiu.", gabarito:"D", alt:{"A": "Poderá efetuar colaboração premiada contra Leonardo Melo, já que ele não ostenta mais a condição de seu cliente.", "B": "Poderá efetuar colaboração premiada contra Robson Lima, por se tratar de cliente que está sendo formalmente investigado como co-autor pela prática do mesmo crime.", "C": "Caso efetue colaboração premiada contra Robson Lima, estará sujeita a processo disciplinar, que poderá culminar na aplicação da pena de suspensão.", "D": "Caso efetue colaboração premiada contra Leonardo Melo, estará sujeita às penas do crime de violação do segredo profissional."}, fb:{"A": "Incorreta. O MAIS CLÁSSICO erro sobre sigilo do advogado: 'ele não é mais meu cliente, então posso falar'. ERRADO. O sigilo profissional do advogado PERSISTE mesmo após o término da relação profissional.", "B": "Incorreta. O fato de Robson ser investigado como coautor do mesmo crime NÃO autoriza Alice a quebrar o sigilo profissional para colaborar contra ele. Ser investigado junto não libera o advogado do sigilo.", "C": "Incorreta. A situação é mais grave do que 'processo disciplinar com possível suspensão'. A violação de sigilo profissional pode configurar CRIME (violação do segredo profissional), não apenas infração disciplinar.", "D": "Correta! O sigilo profissional PERMANECE em relação a clientes e ex-clientes. Se Alice usar informações obtidas como advogada de Leonardo para colaborar premiada contra ele, estará violando o segredo profissional — conduta que pode configurar crime (art. 154, CP) além de infração disciplinar grave."}, fund:"Código de Ética e Disciplina OAB + art. 7º, XIX, EOAB + art. 154, CP: o dever de sigilo profissional do advogado é permanente, alcançando clientes e ex-clientes. A quebra mediante colaboração premiada pode configurar crime de violação do segredo profissional.", caqui:"Sigilo do advogado tem data de nascimento mas não tem data de validade. Nasceu quando o cliente confiou algo ao advogado. Termina quando? Nunca — ou melhor: só quando o próprio cliente autoriza. 'Ex-cliente' não existe para fins de sigilo — existe 'pessoa de quem fui advogado e sobre quem continuo guardando segredo'. Alice poderia colaborar sobre OUTROS fatos, mas não pode usar informações obtidas como advogada de Leonardo ou Robson."},
  {num:21, exame:"XXXVIII Exame — 2023", titulo:"Direitos da Advogada Gestante, Lactante e Após o Parto", enunciado:"Maria, advogada regularmente inscrita na OAB, encontra-se gestante. Em razão de sua condição, Maria tem direitos específicos previstos no Estatuto da Advocacia e da OAB.", comando:"Assinale a opção que apresenta, corretamente um desses direitos.", gabarito:"C", alt:{"A": "Durante a gravidez, ela terá direito a uma vaga garantida nas garagens dos fóruns de todos os tribunais.", "B": "Durante a gravidez ela terá preferência na realização das audiências a serem realizadas no dia, independentemente de comprovação de sua condição.", "C": "Após dar à luz, ela terá direito à suspensão dos prazos processuais por 30 (trinta) dias, contados a partir da data do parto, se for a única patrona da causa.", "D": "Após dar à luz, ela terá preferência na ordem das sustentações orais, mediante comprovação de sua condição, pelo período de 90 (noventa) dias, contados a partir da data do parto."}, fb:{"A": "Incorreta. A reserva de vaga na garagem é direito real previsto no art. 7º-A, mas a expressão 'de todos os tribunais' é imprecisa/absoluta demais. A lei diz 'garagens dos fóruns dos tribunais', sem garantia extensiva e irrestrita para qualquer estrutura no Brasil. Mais importante: a alternativa C está mais precisa e tecnicamente correta.", "B": "Incorreta. A preferência em audiências durante a gravidez EXISTE (art. 7º-A, III), mas depende de COMPROVAÇÃO da condição — a alternativa diz 'independentemente de comprovação', o que é ERRADO.", "C": "Correta! Art. 7º-A, IV, EOAB c/c art. 313, §6º, CPC: a advogada que der à luz tem direito à suspensão de prazos processuais por 30 DIAS, contados a partir da data do parto, quando for a ÚNICA patrona da causa, desde que haja notificação por escrito ao cliente. ATENÇÃO: o prazo é 30 dias, não 60 (o material original continha erro neste ponto).", "D": "Incorreta. A preferência em sustentações orais existe (art. 7º-A, III), mas não tem prazo limitado de '90 dias após o parto' — esse prazo não consta do dispositivo legal."}, fund:"Art. 7º-A, IV, EOAB c/c art. 313, IX e §6º, CPC: suspensão de prazos processuais por 30 dias, contados do parto, quando a advogada for a única patrona da causa, mediante notificação escrita ao cliente. Art. 7º-A, III: preferência em audiências e sustentações exige comprovação da condição, sem limite temporal fixo de 90 dias.", caqui:"⚠️ CORREÇÃO IMPORTANTE: o material de estudo que você recebeu mencionava '60 dias' para a suspensão de prazos — mas o prazo correto é 30 DIAS (art. 313, §6º, CPC). Memorize: PARTO/ADOÇÃO = 30 dias de suspensão + única patrona + notificação escrita. A preferência em audiências/sustentações (inciso III) tem requisito diferente: apenas comprovação da condição, sem prazo fixo de '90 dias' — esse prazo foi inventado pela alternativa D."},
  {num:22, exame:"XXXVIII Exame — 2023", titulo:"Advocacia Pro Bono — Vedação ao Uso como Publicidade", enunciado:"O advogado Luís Santos, regularmente inscrito na OAB, está em início de carreira. Luís presta serviços jurídicos a determinada instituição social sem fins econômicos, consistentes em patrocinar seus interesses em demanda judicial em curso.", comando:"Sobre a atuação de Luís, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Não poderá ser considerada advocacia pro bono a atuação gratuita de Luís como advogado das pessoas naturais, hipossuficientes econômicas, beneficiárias da instituição social.", "B": "É ilícito que Luís preste gratuitamente tais serviços jurídicos, se o objetivo é valer-se de sua atuação como instrumento de publicidade da sua atividade profissional.", "C": "A atuação gratuita de Luís, ainda que não seja eventual, na defesa em Juízo da mencionada instituição social, pode ser considerada advocacia pro bono.", "D": "É admitida a prestação por Luís, sob a forma de advocacia pro bono voluntária, de serviços jurídicos para uma instituição social cobrando preços simbólicos, haja vista a ausência de fins econômicos."}, fb:{"A": "Incorreta. A advocacia pro bono pode sim ser prestada em favor de pessoas naturais hipossuficientes — inclusive as beneficiárias de instituições sociais. A alternativa erra ao excluir essa possibilidade.", "B": "Correta! Código de Ética e Disciplina OAB: a advocacia pro bono é admitida, mas VEDA-SE seu uso como instrumento de publicidade profissional, captação de clientela ou promoção pessoal. Se Luís está atuando gratuitamente com o objetivo de se promover, a conduta é ilícita — não por ser gratuita, mas pelo desvio de finalidade (publicidade disfarçada de altruísmo).", "C": "Incorreta. A advocacia pro bono é gratuita, VOLUNTÁRIA e EVENTUAL. A expressão 'ainda que não seja eventual' torna a alternativa incorreta — a eventualidade é um dos requisitos da atuação pro bono.", "D": "Incorreta. Advocacia pro bono é GRATUITA — cobrar 'preço simbólico' descaracteriza a gratuidade que é a essência do instituto."}, fund:"Código de Ética e Disciplina OAB, arts. sobre advocacia pro bono: prestação gratuita, voluntária e eventual de serviços jurídicos a instituições sem fins econômicos ou pessoas hipossuficientes — vedado uso como publicidade, captação de clientela ou vantagem comercial.", caqui:"Pro bono tem 3 requisitos: GEV = Gratuita + Eventual + Voluntária. E tem 1 vedação fatal: NÃO pode servir de publicidade ou captação de clientes. A alternativa B acertou justamente esse desvio de finalidade: Luís pode ajudar grátis, mas se o objetivo real é aparecer profissionalmente, a conduta vira ilícita. 'Pro bono' é ajuda; marketing disfarçado de ajuda é vedado."},
];
let cur=0,N=QUESTOES.length;
const E=Array(N).fill(null);
function init(){
  const nw=document.getElementById('nw'),ct=document.getElementById('ct');
  QUESTOES.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);
    const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);
  });upd();us();
}
function bc(q,i){
  const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');
  return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação didática do Professor Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn az" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;
}
function resp(i,l,btn){
  if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];
  document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});
  const ok=l===q.gabarito,f=document.getElementById('f'+i);
  f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;
  document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;
  document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn az sh';document.getElementById('bx'+i).className='btn cq sh';
  const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();
}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){
  E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});
  document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';
  document.getElementById('bu'+i).className='btn az';document.getElementById('bu'+i).textContent='Ver fundamento legal';
  document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';
  document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';
  document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();
}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
